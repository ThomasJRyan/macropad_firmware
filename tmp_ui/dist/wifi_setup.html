<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Macropad Wi-Fi Setup</title><link rel="stylesheet" href="styles.css"></head><body><main><h1>Wi-Fi Setup</h1><section><button type="button" id="scan">Scan</button><form id="wifi"><label>Network</label><select id="networks" name="ssid"></select><label>Password</label><input name="password" type="password" maxlength="63"><button type="submit">Save Wi-Fi</button></form></section><p id="status"></p></main><script>const s=document.getElementById('status');const n=document.getElementById('networks');function status(t){s.textContent=t;}async function refreshScan(){const r=await fetch('/api/wifi/scan');const j=await r.json();n.innerHTML='';j.networks.forEach(function(ap){const o=document.createElement('option');o.value=ap.ssid;o.textContent=ap.ssid+' ('+ap.rssi+' dBm)';n.appendChild(o);});if(j.scanning){status('Scanning...');setTimeout(refreshScan,1000);}else{status(j.networks.length?'Scan complete':'No networks found');}}document.getElementById('scan').addEventListener('click',async function(){status('Scanning...');await fetch('/api/wifi/scan',{method:'POST'});refreshScan();});document.getElementById('wifi').addEventListener('submit',async function(e){e.preventDefault();const r=await fetch('/api/wifi',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams(new FormData(this))});status(r.ok?'Wi-Fi saved':'Wi-Fi save failed');});</script></body></html>
