<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Macropad</title><link rel="stylesheet" href="styles.css"></head><body><main><h1>Button Actions</h1><div class="config-shell"><section class="keypad-panel" aria-label="Macropad buttons"><div class="key-grid" id="key-grid"><button class="key is-active" type="button" data-index="0"><span>GP5</span><small>Disabled</small></button><button class="key" type="button" data-index="1"><span>GP4</span><small>Disabled</small></button><button class="key" type="button" data-index="2"><span>GP3</span><small>Disabled</small></button><button class="key" type="button" data-index="3"><span>GP6</span><small>Disabled</small></button><button class="key" type="button" data-index="4"><span>GP7</span><small>Disabled</small></button><button class="key" type="button" data-index="5"><span>GP8</span><small>Disabled</small></button></div><div class="device-controls"><button class="control-button" type="button" data-command="reset-current">Reset Current</button><button class="control-button" type="button" data-command="reset-all">Reset All</button><button class="control-button" type="button" data-command="reboot">Reboot</button><button class="control-button" type="button" data-command="mdns">Change mDNS</button><button class="control-button is-danger" type="button" data-command="factory-reset">Factory Reset</button></div><div class="mdns-panel" id="mdns-panel" hidden><label>mDNS Record</label><div class="mdns-field"><input id="mdns-hostname" maxlength="32" value="macropad"><span>.local</span></div><button class="control-button" type="button" id="save-mdns">Save mDNS</button></div></section><aside class="editor-panel"><form id="action-editor"><div class="editor-header"><h2 id="editor-title">GP5</h2><span id="editor-state">Disabled</span></div><label>Method</label><select name="method"><option value="DISABLED">Disabled</option><option value="GET">GET</option><option value="POST">POST</option></select><label>URL</label><input name="url" maxlength="128" placeholder="http://192.168.0.10/action"><label>POST body</label><textarea name="body" maxlength="512"></textarea><label>Content-Type</label><input name="content_type" maxlength="64" placeholder="application/json"><label>Headers</label><textarea name="headers" maxlength="384" placeholder="Authorization: Bearer token"></textarea><button type="submit">Save Button</button></form></aside></div><p id="status"></p></main><script>const pins=[5,4,3,6,7,8];const keys=[...document.querySelectorAll('.key')];const controlButtons=[...document.querySelectorAll('.control-button[data-command]')];const form=document.getElementById('action-editor');const mdnsPanel=document.getElementById('mdns-panel');const mdnsHostname=document.getElementById('mdns-hostname');const statusEl=document.getElementById('status');let selectedIndex=0;let actions=pins.map(pin=>defaultAction(pin));function defaultAction(pin){return{pin,method:'DISABLED',url:'',body:'',content_type:'',headers:''};}function normalizeAction(action,pin){return{pin,method:action&&action.method?action.method:'DISABLED',url:action&&action.url?action.url:'',body:action&&action.body?action.body:'',content_type:action&&action.content_type?action.content_type:'',headers:action&&action.headers?action.headers:''};}function status(text){statusEl.textContent=text;}function methodLabel(action){return action.method==='DISABLED'?'Disabled':action.method;}function renderKeys(){keys.forEach((key,index)=>{const action=actions[index];key.classList.toggle('is-active',index===selectedIndex);key.dataset.method=action.method.toLowerCase();key.querySelector('small').textContent=methodLabel(action);});}function loadEditor(){const action=actions[selectedIndex];document.getElementById('editor-title').textContent='GP'+pins[selectedIndex];document.getElementById('editor-state').textContent=methodLabel(action);form.elements.method.value=action.method;form.elements.url.value=action.url;form.elements.body.value=action.body;form.elements.content_type.value=action.content_type;form.elements.headers.value=action.headers;}function collectEditor(){actions[selectedIndex]={pin:pins[selectedIndex],method:form.elements.method.value,url:form.elements.url.value,body:form.elements.body.value,content_type:form.elements.content_type.value,headers:form.elements.headers.value};renderKeys();loadEditor();}function payload(){const params=new URLSearchParams();actions.forEach((action,index)=>{params.set('b'+index+'_method',action.method);params.set('b'+index+'_url',action.url);params.set('b'+index+'_body',action.body);params.set('b'+index+'_content_type',action.content_type);params.set('b'+index+'_headers',action.headers);});return params;}async function loadConfig(){const response=await fetch('/api/config');const config=await response.json();applyConfig(config);}function applyConfig(config){if(Array.isArray(config.buttons)){config.buttons.forEach((action,index)=>{const pinIndex=pins.indexOf(action.pin);const target=pinIndex>=0?pinIndex:index;if(target>=0&&target<actions.length){actions[target]=normalizeAction(action,pins[target]);}});}if(config.mdns_hostname){mdnsHostname.value=config.mdns_hostname;}renderKeys();loadEditor();}async function postForm(url,params){const response=await fetch(url,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:params});if(!response.ok){throw new Error('request failed');}return response.json();}keys.forEach(key=>{key.addEventListener('click',()=>{collectEditor();selectedIndex=Number(key.dataset.index);renderKeys();loadEditor();});});form.elements.method.addEventListener('change',collectEditor);async function resetCurrentButton(){const config=await postForm('/api/button/reset',new URLSearchParams({index:String(selectedIndex)}));applyConfig(config);status('Current button reset');}async function resetAllButtons(){const config=await postForm('/api/buttons/reset-all',new URLSearchParams());applyConfig(config);status('All buttons reset');}function toggleMdnsPanel(){mdnsPanel.hidden=!mdnsPanel.hidden;if(!mdnsPanel.hidden){mdnsHostname.focus();}}controlButtons.forEach(button=>{button.addEventListener('click',async()=>{const command=button.dataset.command;try{if(command==='reset-current')await resetCurrentButton();if(command==='reset-all')await resetAllButtons();if(command==='reboot'){await postForm('/api/reboot',new URLSearchParams());status('Rebooting');}if(command==='factory-reset'){await postForm('/api/factory-reset',new URLSearchParams());actions=pins.map(pin=>defaultAction(pin));renderKeys();loadEditor();status('Factory reset started');}if(command==='mdns')toggleMdnsPanel();}catch(error){status('Command failed');}});});document.getElementById('save-mdns').addEventListener('click',async()=>{const hostname=mdnsHostname.value.trim()||'macropad';mdnsHostname.value=hostname;try{const config=await postForm('/api/mdns',new URLSearchParams({hostname}));applyConfig(config);status('mDNS saved: '+mdnsHostname.value+'.local');}catch(error){status('mDNS save failed');}});form.addEventListener('submit',async event=>{event.preventDefault();collectEditor();try{const config=await postForm('/api/config',payload());applyConfig(config);status('Button saved');}catch(error){status('Button save failed');}});renderKeys();loadEditor();loadConfig().catch(()=>status('Config load failed'));</script></body></html>
